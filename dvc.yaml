stages:
  download_data:
    cmd: poetry run python src/data/download.py
    deps:
      - src/data/download.py
      - src/data/load_postgres.py

  extract_features:
    cmd: poetry run python src/features/feature_pipeline.py
    deps:
      - src/features/feature_pipeline.py
      - src/features/ner_extractor.py

  train_models:
    cmd: >
      poetry run python src/models/root_cause_classifier.py &&
      poetry run python src/models/anomaly_detector.py &&
      poetry run python src/models/helpfulness_predictor.py
    deps:
      - src/models/root_cause_classifier.py
      - src/models/anomaly_detector.py
      - src/models/helpfulness_predictor.py
